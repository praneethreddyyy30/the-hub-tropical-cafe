# Production profile properties
# Spring Boot automatically loads this when the environment variable SPRING_PROFILES_ACTIVE=prod is set

# Configure production database (PostgreSQL is recommended for Supabase free-tier)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# DDL Auto: update database schema dynamically
spring.jpa.hibernate.ddl-auto=update

# Disable show-sql for production logs cleanliness
spring.jpa.show-sql=false
