spring.application.name=backend
server.port=8080

# --- DATABASE CONFIGURATION ---

# 1. H2 File-Based Database (Persistent across restarts)
spring.datasource.url=jdbc:h2:file:./data/smart_cafe;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# 2. MySQL Database Configuration (Comment out H2 and uncomment this for production)
# spring.datasource.url=jdbc:mysql://localhost:3306/smart_cafe?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=root
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- JPA / HIBERNATE CONFIGURATIONS ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# --- JWT PROPERTIES ---
# 256-bit secret key (Hex encoded)
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# --- GOOGLE SHEETS INTEGRATION WEBHOOK ---
# Insert your Google Apps Script Web App URL below
google.sheets.webhook.url=https://script.google.com/macros/s/YOUR_MOCK_URL/exec
